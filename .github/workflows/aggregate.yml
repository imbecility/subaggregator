name: Aggregate Subscriptions

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Build subaggregator
        run: go build -o /tmp/subaggregator .

      - name: Run subaggregator
        env:
          GITVERSE_TOKEN: ${{ secrets.GITVERSE_TOKEN }}
        run: |
          /tmp/subaggregator \
            --output sub.txt.gz \
            --gitverse-repo "${{ vars.GITVERSE_REPO }}" \
            --gitverse-token "$GITVERSE_TOKEN" \
            subscriptions.txt

          SIZE=$(du -sh sub.txt.gz | cut -f1)
          LINES=$(zcat sub.txt.gz | wc -l)
          echo "Lines: $LINES, Size: $SIZE"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create sub \
            --title "Aggregated Subscription" \
            --notes "Автообновляемая агрегированная подписка. Не редактировать вручную." \
            2>/dev/null || true

          gh release upload sub sub.txt.gz --clobber

      - name: Upload error reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subaggregator-errors-${{ github.run_number }}
          path: errors/
          if-no-files-found: ignore
          retention-days: 7

      - name: Job summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LINES=$(zcat sub.txt.gz | wc -l)
          SIZE=$(du -sh sub.txt.gz | cut -f1)
          GH_URL="https://github.com/${{ github.repository }}/releases/download/sub/sub.txt.gz"

          echo "## Aggregation Result" >> $GITHUB_STEP_SUMMARY
          echo "| Параметр | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Уникальных конфигов | $LINES |" >> $GITHUB_STEP_SUMMARY
          echo "| Размер архива | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Обновлено | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub подписка | [\`sub.txt.gz\`]($GH_URL) |" >> $GITHUB_STEP_SUMMARY

          if [ -n "${{ vars.GITVERSE_REPO }}" ]; then
            GV_USER=$(echo "${{ vars.GITVERSE_REPO }}" | cut -d/ -f1)
            GV_REPO=$(echo "${{ vars.GITVERSE_REPO }}" | cut -d/ -f2)
            GV_URL="https://gitverse.ru/${GV_USER}/${GV_REPO}/releases"
            echo "| GitVerse подписка | [${{ vars.GITVERSE_REPO }} releases]($GV_URL) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d errors ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Ошибки" >> $GITHUB_STEP_SUMMARY
            for f in errors/*.txt; do
              [ -f "$f" ] || continue
              echo "- \`$(basename $f)\`: $(wc -l < $f) записей" >> $GITHUB_STEP_SUMMARY
            done
          fi
