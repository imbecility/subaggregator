name: Aggregate Subscriptions

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:          # ручной запуск

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: subaggregator/go.sum

      - name: Build subaggregator
        run: |
          # cd subaggregator
          go build -o /tmp/subaggregator .

      - name: Run subaggregator
        run: |
          /tmp/subaggregator subscriptions.txt > sub.txt
          LINES=$(wc -l < sub.txt)
          SIZE=$(du -sh sub.txt | cut -f1)
          echo "Lines: $LINES, Size: $SIZE"

      - name: Publish to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Создаём релиз с тегом "sub" если ещё не существует
          gh release create sub \
            --title "Aggregated Subscription" \
            --notes "Автообновляемая агрегированная подписка. Не редактировать вручную." \
            --prerelease \
            2>/dev/null || true

          # --clobber: заменяем файл если уже есть в релизе
          gh release upload sub sub.txt --clobber

      - name: Upload error reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subaggregator-errors-${{ github.run_number }}
          path: errors/
          if-no-files-found: ignore
          retention-days: 7

      - name: Job summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LINES=$(wc -l < sub.txt)
          SIZE=$(du -sh sub.txt | cut -f1)
          URL="https://github.com/${{ github.repository }}/releases/download/sub/sub.txt"

          echo "## Aggregation Result" >> $GITHUB_STEP_SUMMARY
          echo "| Параметр | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Уникальных конфигов | $LINES |" >> $GITHUB_STEP_SUMMARY
          echo "| Размер файла | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Обновлено | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL подписки | [\`sub.txt\`]($URL) |" >> $GITHUB_STEP_SUMMARY

          if [ -d errors ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Ошибки" >> $GITHUB_STEP_SUMMARY
            for f in errors/*.txt; do
              [ -f "$f" ] || continue
              echo "- \`$(basename $f)\`: $(wc -l < $f) записей" >> $GITHUB_STEP_SUMMARY
            done
          fi
