name: Aggregate Subscriptions

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:          # ручной запуск

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: subaggregator/go.sum

      - name: Build subaggregator
        run: |
          # cd subaggregator
          go build -o /tmp/subaggregator .

      - name: Run subaggregator
        run: |
          /tmp/subaggregator subscriptions.txt > sub.txt

      - name: Upload error reports
        if: always()   # загружаем даже если aggregator завершился с ошибкой
        uses: actions/upload-artifact@v6
        with:
          name: aggregator-errors-${{ github.run_number }}
          path: errors/
          if-no-files-found: ignore
          retention-days: 7

      - name: Job summary
        run: |
          echo "## Aggregation Result" >> $GITHUB_STEP_SUMMARY
          echo "- Total unique configs: $(wc -l < sub.txt)" >> $GITHUB_STEP_SUMMARY
          echo "- Updated at: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d errors ]; then
            echo "## Error Files" >> $GITHUB_STEP_SUMMARY
            for f in errors/*.txt; do
              [ -f "$f" ] || continue
              lines=$(wc -l < "$f")
              echo "- \`$f\`: $lines записей" >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          if ! git diff --staged --quiet; then
            git commit -m "chore: update subscription $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
            git push
          else
            echo "No changes — subscription is up to date"
          fi
